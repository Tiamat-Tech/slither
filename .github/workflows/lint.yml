---
name: Lint

defaults:
  run:
    shell: bash

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - "docs/**/*.md"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89  # v4.1.0
        with:
          args: "check slither/ tests/ scripts/"

      - name: Run Ruff formatter check
        run: |
          echo "::group::Checking formatting with Ruff"
          ruff format --check slither/ tests/ scripts/ || FORMAT_EXIT=$?
          echo "::endgroup::"
          if [ "${FORMAT_EXIT:-0}" -ne 0 ]; then
            echo "❌ Formatting check failed. Run 'make reformat' or 'ruff format' locally to fix formatting."
            exit "$FORMAT_EXIT"
          fi
          echo "✅ Formatting check passed"

  yamllint:
    name: yamllint
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v7
        with:
          enable-cache: true

      - name: Run yamllint
        run: |
          echo "::group::Running yamllint"
          uvx yamllint .github/ || YAML_EXIT=$?
          echo "::endgroup::"
          if [ "${YAML_EXIT:-0}" -ne 0 ]; then
            echo "❌ YAML linting failed. Fix the YAML syntax errors shown above."
            exit "$YAML_EXIT"
          fi
          echo "✅ YAML linting passed"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v24.0.0
        with:
          globs: "docs/**/*.md"
          config: .github/linters/.markdownlint.json
